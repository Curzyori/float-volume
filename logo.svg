<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1A1A1E" />
      <stop offset="100%" stop-color="#121214" />
    </radialGradient>

    <linearGradient id="lavenderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D0BCFF" />
      <stop offset="100%" stop-color="#9A82DB" />
    </linearGradient>

    <linearGradient id="trackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#49454F" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#49454F" stop-opacity="0.8" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#9A82DB" flood-opacity="0.25" />
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <rect x="48" y="48" width="416" height="416" rx="88" fill="#1C1B1F" stroke="#2B2930" stroke-width="2" />

  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#trackGrad)" stroke-width="12" stroke-dasharray="10 15" opacity="0.5" />
  
  <g filter="url(#glow)">
    <path d="M 160,170 
             L 340,170 
             M 160,245 
             L 290,245 
             M 160,160
             L 160,280
             Q 160,330 190,360
             L 256,410
             L 322,360
             Q 352,330 352,280
             L 352,160" 
          fill="none" 
          stroke="url(#lavenderGrad)" 
          stroke-width="34" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <circle cx="352" cy="160" r="22" fill="#E6DFF3" />
  </g>

  <text x="256" y="445" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#E6E1E5" letter-spacing="6" text-anchor="middle">FLOAT VOLUME</text>
</svg>
